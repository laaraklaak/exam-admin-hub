<style>
/* RESTORED HIGH-FOCUS CSS */
:root {
  --bg: #f2f0eb; --surface: #ffffff; --surface2: #ebe9e3; --border: #dddad2; --border-strong: #bbb9b0;
  --text: #181715; --text-2: #5c5a54; --text-3: #9c9a93; --radius: 14px; --radius-sm: 8px;
  --blue: #1d4ed8; --blue-bg: #dbeafe; --blue-mid: #3b82f6; --green: #15803d; --green-bg: #dcfce7; --green-mid: #22c55e;
  --amber: #fbbf24; --amber-bg: #2a1f08; --amber-border: #453008; --red: #b91c1c; --red-bg: #fee2e2; --red-mid: #ef4444;
}
[data-theme="dark"] {
  --bg: #0f0f0e; --surface: #1a1a18; --surface2: #232320; --border: #2c2c28; --border-strong: #3e3e3a;
  --text: #e8e5de; --text-2: #8a877e; --text-3: #55524c;
  --blue: #93c5fd; --blue-bg: #1e2d4a; --green: #86efac; --green-bg: #14281e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:600;font-size:16px;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
.topbar-nav{display:flex;gap:3px}
.nav-btn{background:none;border:none;cursor:pointer;padding:6px 13px;border-radius:var(--radius-xs);color:var(--text-2);font-size:13px;transition:0.12s}
.nav-btn.active{background:var(--blue-bg);color:var(--blue);font-weight:600}

.main{max-width:800px;margin:0 auto;padding:20px 14px 100px}
.panel{display:none}.panel.active{display:block}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-card{border-radius:var(--radius);padding:16px 18px;border:1.5px solid transparent}
.stat-card.blue{background:var(--blue-bg);border-color:#bfdbfe}
.stat-card.green{background:var(--green-bg);border-color:#bbf7d0}
.stat-card.amber{background:var(--amber-bg);border-color:var(--amber-border)}
.stat-value{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;line-height:1}
.stat-card.amber .stat-value, .stat-card.amber .stat-label {color:var(--amber)}

/* GATE INTERFACE */
.date-group{border-bottom:2px solid var(--border); padding-bottom:20px; margin-bottom:30px}
.date-gate-trigger{font-size:11px; font-weight:700; text-transform:uppercase; background:var(--surface2); padding:10px 14px; border-radius:6px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; margin-bottom:12px; color:var(--text-2); border:1px solid transparent; transition:0.2s}
.date-gate-trigger:hover{border-color:var(--blue-mid); background:var(--surface)}
.session-separator{border-top: 1px dashed var(--border); margin: 12px 0; opacity: 0.4;}

/* EXAM CARDS */
.exam-list{display:flex;flex-direction:column;gap:8px}
.exam-card{border-radius:var(--radius);border:1.5px solid transparent;overflow:hidden;transition:transform .12s}
.exam-card-inner{display:grid;grid-template-columns:1fr auto;gap:0 12px;padding:14px 16px;align-items:center}
.exam-subject{font-weight:600;font-size:14px;margin-bottom:4px;line-height:1.2}
.exam-meta{font-size:11px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;opacity:0.85}
.slot-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.3)}

/* GATE MODAL OVERLAY */
.modal-overlay{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; padding:20px}
.modal-card{background:var(--surface); width:100%; max-width:400px; border-radius:var(--radius); padding:24px; border:1px solid var(--border)}
.modal-stat-row{display:flex; justify-content:space-between; margin-bottom:12px; padding:8px 0; border-bottom:1px dashed var(--border)}

/* FORM & UI */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:15px}
input, select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);width:100%}
.btn-primary{background:var(--blue-mid);color:white;border:none;border-radius:8px;padding:12px;font-weight:600;cursor:pointer;width:100%}
.btn-small{background:var(--surface2);border:1px solid var(--border);padding:6px 10px;font-size:11px;border-radius:4px;cursor:pointer;color:var(--text);font-weight:500}
.report-section{border-left:4px solid var(--blue-mid);padding-left:15px;margin-bottom:20px}
.remarks-box{background:var(--surface2);padding:12px;border-radius:8px;font-style:italic;font-size:13px;margin-top:8px;border:1px dashed var(--border-strong)}
.exam-row{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)}
.exam-row-dot{width:8px; height:8px; border-radius:50%; margin-right:12px; flex-shrink:0}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px;z-index:100}
@media(max-width:600px){.topbar-nav{display:none} .bottom-nav{display:flex; justify-content:space-around}}

/* Toast Notification */
.toast {position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--blue-mid); color:white; padding:10px 20px; border-radius:30px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:0.3s; z-index:9999;}
.toast.show {opacity:1; bottom:100px;}
</style>
</head>

const AUX_REGEX = /(digital media|edpm|tech.*drawing.*p2|music|visual arts|spanish.*p1|online|reading|paper\s*0?32|p0?32)/i;

const getStaffNeeded = (n) => Math.max(1, Math.ceil(n / 30));

const getDailyStaff = (examsArr) => {
    const timeSlots = {};
    examsArr.forEach(e => {
        if (!timeSlots[e.time]) timeSlots[e.time] = {};
        
        const searchString = e.subject + ' ' + (e.notes||'') + ' ' + (e.room||'');
        let r;
        
        if (AUX_REGEX.test(searchString)) {
            r = "Auxiliary: " + ((e.room && e.room !== "TBD") ? e.room : e.subject); 
        } else {
            r = "Main Hall Pool"; 
        }

        if (!timeSlots[e.time][r]) timeSlots[e.time][r] = { cands: 0, manualMax: 0 };
        
        timeSlots[e.time][r].cands += e.candidates + (e.ext_nlt || 0) + (e.ext_jp || 0);
        if (e.manual_staff > timeSlots[e.time][r].manualMax) {
            timeSlots[e.time][r].manualMax = e.manual_staff;
        }
    });

    let peakStaffNeeded = 0;
    for (const time in timeSlots) {
        let staffForThisSlot = 0;
        for (const room in timeSlots[time]) {
            const data = timeSlots[time][room];
            const autoStaff = Math.max(1, Math.ceil(data.cands / 30));
            staffForThisSlot += Math.max(autoStaff, data.manualMax);
        }
        if (staffForThisSlot > peakStaffNeeded) peakStaffNeeded = staffForThisSlot;
    }
    return peakStaffNeeded;
};

function loadData() { 
    let d = JSON.parse(localStorage.getItem(SK)); 
    // If local storage is empty, initialize with BASE_EXAMS
    if (!d || !d.exams || !d.exams.length) { 
        d = { exams: BASE_EXAMS }; 
        saveData(d); 
    } 
    return d; 
}

function saveData(d) { 
    // Save locally for instant UI response
    localStorage.setItem(SK, JSON.stringify(d)); 
    // Push silently to the cloud (if Firebase is loaded)
    if(window.firebaseDB) {
        window.firebaseDB.ref('examhub/data').set(d); 
    }
}

function loadStaff() { 
    return JSON.parse(localStorage.getItem(STK)) || ["Lead Invigilator (Assistant)"]; 
}

function saveStaff(s) { 
    localStorage.setItem(STK, JSON.stringify(s)); 
    if(window.firebaseDB) {
        window.firebaseDB.ref('examhub/staff').set(s); 
    }
}

function renderDashboard() {
  const d = loadData(), t = todayStr(), filter = document.getElementById('dash-week-filter').value;
  let up = d.exams.filter(e => e.date >= t).sort((a,b) => a.date.localeCompare(b.date));

  if (filter !== 'all') {
    const weeks = {"1":["2026-05-04","2026-05-08"],"2":["2026-05-11","2026-05-15"],"3":["2026-05-18","2026-05-22"],"4":["2026-05-25","2026-05-29"],"5":["2026-06-01","2026-06-05"],"6":["2026-06-08","2026-06-12"],"7":["2026-06-15","2026-06-16"]};
    if(weeks[filter]) up = d.exams.filter(e => e.date >= weeks[filter][0] && e.date <= weeks[filter][1]);
  }

  const nextDay = up.filter(e => e.date === up[0]?.date);
  const staffCount = getDailyStaff(nextDay);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card blue"><div class="stat-value">${up.length}</div><div class="stat-label">Total Future Sessions</div></div>
    <div class="stat-card green"><div class="stat-value">${staffCount}</div><div class="stat-label">Peak Staff Needed</div></div>
    <div class="stat-card amber"><div class="stat-value">${Math.max(0, staffCount - 1)}</div><div class="stat-label">Additional Teachers</div></div>`;

  let html = '';
  const grouped = {};
  up.forEach(e => { if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
  
  Object.keys(grouped).forEach(date => {
    html += `<div class="date-group">
      <div class="date-gate-trigger" onclick="openGate('${date}')">
        <span>${fmtDate(date)}${date===t?' <span class="today-badge">Today</span>':''}</span>
        <span style="opacity:0.6">GATE SUMMARY ➔</span>
      </div>
      <div class="exam-list">`;
    grouped[date].forEach(e => {
      const c = subjColor(e.subject), dk = document.documentElement.hasAttribute('data-theme');
      let manualFlag = e.manual_staff ? `<span style="color:var(--amber); margin-left:5px">(*Manual: ${e.manual_staff})</span>` : '';
      let staffFlag = e.assigned && e.assigned.length ? `<span style="color:var(--blue); font-weight:600; margin-left:5px">[👥 ${e.assigned.join(', ')}]</span>` : '';
      
      html += `<div class="exam-card" style="background:${dk?c.dbg:c.bg}; border-color:${dk?c.dark:c.mid}44">
        <div class="exam-card-inner">
          <div><div class="exam-subject" style="color:${dk?c.dark:c.mid}">${e.subject}</div>
          <div class="exam-meta" style="color:${dk?c.dark:c.mid}"><span>${e.room}</span><span class="slot-pill">${e.time.includes('Morning')?'AM':'PM'}</span><span style="font-size:10px;opacity:0.8">[${e.center}]</span>${manualFlag}${staffFlag}</div></div>
          <div class="exam-right" style="color:${dk?c.dark:c.mid}"><div class="exam-count">${e.candidates + (e.ext_nlt||0) + (e.ext_jp||0)}</div></div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('exam-list-container').innerHTML = html || '<div class="empty-state" style="padding:40px; text-align:center">No scheduled exams for selected view</div>';

  let rem = '';
  if (t >= "2026-05-04" && t <= "2026-05-22") {
    rem += `<div class="alert alert-info">🎨 <b>Visual Arts:</b> May 4-22 Production Period (3 Candidates).</div>`;
  }
  const todayExams = d.exams.filter(e => e.date === t);
  todayExams.forEach(e => {
      const searchString = e.subject + ' ' + (e.notes||'') + ' ' + (e.room||'');
      if (AUX_REGEX.test(searchString)) {
          rem += `<div class="alert alert-today">🔬 <b>${e.subject}:</b> Auxiliary technical/specialized setup required today.</div>`;
      }
  });
  document.getElementById('reminders-container').innerHTML = rem;
}

function openGate(date) {
    const day = loadData().exams.filter(e => e.date === date);
    const cands = day.reduce((s,e) => s + e.candidates + (e.ext_nlt||0) + (e.ext_jp||0), 0);
    const staff = getDailyStaff(day);
    
    const roomsSet = new Set(day.map(e => {
        const searchString = e.subject + ' ' + (e.notes||'') + ' ' + (e.room||'');
        if (AUX_REGEX.test(searchString)) {
            return "Auxiliary: " + ((e.room && e.room !== "TBD") ? e.room : e.subject);
        }
        return "Main Hall Pool";
    }));
    const rooms = roomsSet.size;
    
    const eb = day.filter(e=>e.center==='Enid Bennett').reduce((s,e)=>s+e.candidates,0);
    const nlt = day.reduce((s,e)=>s+(e.ext_nlt||0),0) + day.filter(e=>e.center==='100658').reduce((s,e)=>s+e.candidates,0);
    const jp = day.reduce((s,e)=>s+(e.ext_jp||0),0) + day.filter(e=>e.center==='100427').reduce((s,e)=>s+e.candidates,0);

    document.getElementById('modal-date-title').textContent = fmtDate(date);
    document.getElementById('modal-stats-content').innerHTML = `
        <div class="modal-stat-row"><span>Total Candidates Hosted</span><b>${cands}</b></div>
        <div class="modal-stat-row"><span>Peak Invigilators Needed</span><b>${staff}</b></div>
        <div class="modal-stat-row" style="color:var(--green)"><span>Lead Assistant (Base Staff)</span><b>1</b></div>
        <div class="modal-stat-row" style="color:var(--amber)"><span>Additional Teachers Needed</span><b>${Math.max(0, staff - 1)}</b></div>
        <div class="modal-stat-row"><span>Distinct Physical Spaces</span><b>${rooms}</b></div>
        <div style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px">
            <div class="modal-stat-row" style="border:none; margin-bottom:5px"><span>Enid Bennett (Base)</span><b>${eb}</b></div>
            <div class="modal-stat-row" style="border:none; margin-bottom:5px; color:var(--blue)"><span>NLT (100658)</span><b>${nlt}</b></div>
            <div class="modal-stat-row" style="border:none; color:var(--purple)"><span>JP (100427)</span><b>${jp}</b></div>
        </div>
    `;
    document.getElementById('gate-modal').style.display = 'flex';
}

function renderAllExams() {
  const d = loadData(); 
  let html = '';
  
  // Apply Search Filter Logic
  const filterInput = document.getElementById('schedule-filter');
  const filterTerm = filterInput ? filterInput.value.toLowerCase() : '';

  let examsToRender = d.exams;
  if (filterTerm) {
      examsToRender = examsToRender.filter(e => 
          e.subject.toLowerCase().includes(filterTerm) ||
          e.room.toLowerCase().includes(filterTerm) ||
          e.center.toLowerCase().includes(filterTerm)
      );
  }

  examsToRender.sort((a,b) => a.date.localeCompare(b.date)).forEach(e => {
    const c = subjColor(e.subject);
    html += `<div class="exam-row" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)">
      <div class="exam-row-dot" style="background:${c.mid}"></div>
      <div style="flex:1">
        <b>${e.subject}</b><br>
        <small>${fmtDate(e.date)} · ${e.candidates} Candidates [${e.center}] · Room: ${e.room}</small>
        ${e.manual_staff ? `<br><small style="color:var(--amber)">*Manual Override: ${e.manual_staff} Staff*</small>` : ''}

      </div>
      <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end">
        <button class="btn-small" onclick="addExt(${e.id})">+ Ext</button>
        <button class="btn-small" onclick="assignStaff(${e.id})">👥 Staff</button>

        <button class="btn-small" onclick="deleteExam(${e.id})" style="color:var(--red)">✕</button>
      </div>
    </div>`;
  });

  // Empty state handling

      html = `<div style="padding:20px; text-align:center; color:var(--text-3); font-style:italic;">No exams match "${filterTerm}"</div>`;
  }

  document.getElementById('all-exams-list').innerHTML = html;
}

function editExam(id) {
    const d = loadData();
    const e = d.exams.find(x => x.id === id);
    if (!e) return;

    const newRoom = prompt("Assign Room (Current: " + e.room + "):", e.room);
    if (newRoom === null) return;

    const newCands = prompt("EB Candidates (Current: " + e.candidates + "):", e.candidates);
    if (newCands === null) return;

    const currentTotal = parseInt(newCands) + (e.ext_nlt||0) + (e.ext_jp||0);
    const autoInv = Math.max(1, Math.ceil(currentTotal / 30));
    
    const manualInv = prompt("Invigilators Needed\n(Auto-calculated based on 1:30 ratio is " + autoInv + ". Enter a different number to manually override):", e.manual_staff || autoInv);
    if (manualInv === null) return;

    e.room = newRoom.trim() || "TBD";
    e.candidates = parseInt(newCands) || 0;
    
    if (parseInt(manualInv) !== autoInv) {
        e.manual_staff = parseInt(manualInv);
    } else {
        delete e.manual_staff; 
    }

    saveData(d); renderAllExams(); renderDashboard(); showToast("Exam Updated");
}

function addExt(id) {
  const d = loadData(); const e = d.exams.find(x => x.id === id);
  const nlt = parseInt(prompt("NLT (100658):", e.ext_nlt || 0)) || 0;
  const jp = parseInt(prompt("JP (100427):", e.ext_jp || 0)) || 0;
  e.ext_nlt = nlt; e.ext_jp = jp;
  saveData(d); renderAllExams(); renderDashboard();
}

function saveExam(){ 
  const s=document.getElementById('f-subject').value, d=document.getElementById('f-date').value, c=parseInt(document.getElementById('f-candidates').value); 
  if(!s||!d) { showToast("Subject and Date required"); return; }
  const dat=loadData(); 
  dat.exams.push({id:Date.now(), subject:s, center:document.getElementById('f-center').value, date:d, room:document.getElementById('f-room').value||"TBD", time:document.getElementById('f-time').value, candidates:c}); 
  saveData(dat); showPanel('dashboard'); showToast("Added to Roster"); 
}
function deleteExam(id){ const d=loadData(); d.exams=d.exams.filter(x=>x.id!==id); saveData(d); renderAllExams(); renderDashboard(); }

function assignStaff(id) {
  const d = loadData(); const e = d.exams.find(x => x.id === id); const roster = loadStaff();
  const chosen = prompt("Assign Staff (comma separated):\n" + roster.join(", "), (e.assigned||[]).join(", "));
  if (chosen !== null) { e.assigned = chosen.split(",").map(s => s.trim()).filter(s => s !== ""); saveData(d); renderStaff(); renderAllExams(); renderDashboard(); }
}

function renderStaff() {
  const roster = loadStaff(), d = loadData(); let listHtml = '', statHtml = '';
  
  roster.forEach(name => {
    const sessWorked = new Set();
    d.exams.filter(e => e.assigned?.includes(name)).forEach(e => {
        sessWorked.add(e.date + '|' + e.time);
    });
    
    const distinctDays = new Set(Array.from(sessWorked).map(s => s.split('|')[0])).size;
    const totalSessions = sessWorked.size;

    listHtml += `<div class="exam-row" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)">
        <div style="display:flex; align-items:center; gap:8px; flex:1;">
            <div class="exam-row-dot" style="background:var(--blue-mid)"></div>
            <span style="font-weight:500">${name}</span>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn-small" onclick="printStaffSchedule('${name}')">🖨️ Schedule</button>
            <button class="btn-small" onclick="removeStaff('${name}')" style="color:var(--red)">✕</button>
        </div>
    </div>`;
    
    statHtml += `<div class="exam-row" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)">
        <b>${name}</b><span>${distinctDays} Days | ${totalSessions} Sessions Worked</span>
    </div>`;
  });
  document.getElementById('staff-list').innerHTML = listHtml; document.getElementById('staff-stats').innerHTML = statHtml;
}

function addStaff(){ const n=document.getElementById('new-staff-name').value.trim(); if(n){const s=loadStaff(); if(!s.includes(n)) s.push(n); saveStaff(s); renderStaff(); document.getElementById('new-staff-name').value='';}}
function removeStaff(n){ const s=loadStaff().filter(x=>x!==n); saveStaff(s); renderStaff(); }

function printStaffSchedule(staffName) {
    const d = loadData();
    const myExams = d.exams.filter(e => e.assigned?.includes(staffName)).sort((a,b) => a.date.localeCompare(b.date));
    
    let html = `<html><head><title>${staffName} - Invigilation Schedule</title>
    <style>
        body { font-family: sans-serif; padding: 30px; color: #000; max-width: 800px; margin: 0 auto; line-height: 1.5; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #aaa; padding: 12px; text-align: left; }
        th { background: #f4f4f4; }
        h2 { margin-bottom: 5px; }
    </style></head><body>
    <h2>Invigilation Schedule: ${staffName}</h2>
    <p>Generated on: ${fmtDate(todayStr())}</p>
    <table>
    <tr><th>Date</th><th>Time Slot</th><th>Subject(s)</th><th>Room Assignment</th></tr>`;

    if (myExams.length === 0) {
        html += `<tr><td colspan="4" style="text-align:center; padding:20px;">No sessions assigned yet.</td></tr>`;
    } else {
        myExams.forEach(e => {
            html += `<tr>
                <td>${fmtDate(e.date)}</td>
                <td>${e.time}</td>
                <td>${e.subject}</td>
                <td>${e.room}</td>
            </tr>`;
        });
    }

    html += `</table>
    <div style="margin-top:30px; font-size:12px; color:#666;">Generated via Exam Admin Hub PRO</div>
    <script>window.onload = function() { window.print(); }<\/script>
    </body></html>`;

    const printWin = window.open('', '_blank');
    printWin.document.write(html);
    printWin.document.close();
}

function renderReports() {
    const start = document.getElementById('rep-start').value;
    const end = document.getElementById('rep-end').value;
    const center = document.getElementById('rep-center').value;
    const subj = document.getElementById('rep-subj').value.toLowerCase();
    const invig = document.getElementById('rep-invig').value;

    let filtered = loadData().exams;

    // 1. APPLY ALL ACTIVE FILTERS
    if (start) filtered = filtered.filter(e => e.date >= start);
    if (end) filtered = filtered.filter(e => e.date <= end);
    if (center !== 'all') filtered = filtered.filter(e => e.center === center);
    if (subj) filtered = filtered.filter(e => e.subject.toLowerCase().includes(subj));
    if (invig !== 'all') filtered = filtered.filter(e => e.assigned && e.assigned.includes(invig));

    let html = ``;

    if (filtered.length === 0) {
        document.getElementById('report-content').innerHTML = "<p style='text-align:center; padding:20px; color:var(--text-3)'>No sessions match your search criteria.</p>";
        return;
    }

    // Sort chronologically before grouping
    filtered.sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

    // 2. GROUP BY DATE -> THEN BY TIME -> THEN APPLY POOLING RULES
    const groupedByDate = {};
    filtered.forEach(e => {
        if (!groupedByDate[e.date]) groupedByDate[e.date] = { times: {}, totalCands: 0 };
        if (!groupedByDate[e.date].times[e.time]) groupedByDate[e.date].times[e.time] = { rooms: {} };
        
        const searchString = e.subject + ' ' + (e.notes||'') + ' ' + (e.room||'');
        let roomKey = AUX_REGEX.test(searchString) ? "Auxiliary: " + ((e.room && e.room !== "TBD") ? e.room : e.subject) : "Main Hall Pool";
        let isAux = AUX_REGEX.test(searchString);

        if (!groupedByDate[e.date].times[e.time].rooms[roomKey]) {
            groupedByDate[e.date].times[e.time].rooms[roomKey] = { cands: 0, manualMax: 0, subjects: [], isAux: isAux, centers: new Set(), staffNames: new Set() };
        }
        
        const candCount = e.candidates + (e.ext_nlt||0) + (e.ext_jp||0);
        groupedByDate[e.date].times[e.time].rooms[roomKey].cands += candCount;
        groupedByDate[e.date].totalCands += candCount;
        groupedByDate[e.date].times[e.time].rooms[roomKey].subjects.push(e.subject);
        groupedByDate[e.date].times[e.time].rooms[roomKey].centers.add(e.center);
        
        if (e.assigned) e.assigned.forEach(name => groupedByDate[e.date].times[e.time].rooms[roomKey].staffNames.add(name));
        if (e.manual_staff > groupedByDate[e.date].times[e.time].rooms[roomKey].manualMax) {
            groupedByDate[e.date].times[e.time].rooms[roomKey].manualMax = e.manual_staff;
        }
    });

    // 3. BUILD THE MULTI-DAY UI
    for (const date in groupedByDate) {
        html += `<div class="date-header" style="background:var(--surface2); padding:10px 15px; border-radius:6px; font-weight:700; margin-top:25px; color:var(--text); font-size:16px;">
                    📅 ${fmtDate(date)} 
                    <span style="float:right; font-size:13px; font-weight:normal;">Day Total: ${groupedByDate[date].totalCands} Cands</span>
                 </div>`;

        for (const time in groupedByDate[date].times) {
            let sessionStaffNeeded = 0;
            
            for (const room in groupedByDate[date].times[time].rooms) {
                const data = groupedByDate[date].times[time].rooms[room];
                const autoInv = Math.max(1, Math.ceil(data.cands / 30));
                sessionStaffNeeded += Math.max(autoInv, data.manualMax);
            }

            const additionalTeachers = Math.max(0, sessionStaffNeeded - 1);

            html += `<div style="margin-top:15px; padding-bottom:10px; border-bottom:2px solid var(--border); font-size:15px;">
                        <b>${time} Session</b><br>
                        <span style="font-size:13px; color:var(--text-2)">
                            Staff Required: <b>${sessionStaffNeeded}</b> 
                            <span style="color:var(--green)">(1 Lead Assistant)</span> 
                            ${additionalTeachers > 0 ? `<span style="color:var(--amber)">+ (${additionalTeachers} Additional Teacher${additionalTeachers > 1 ? 's' : ''})</span>` : ''}
                        </span>
                     </div>`;

            for (const room in groupedByDate[date].times[time].rooms) {
                const data = groupedByDate[date].times[time].rooms[room];
                const autoInv = Math.max(1, Math.ceil(data.cands / 30));
                const finalStaff = Math.max(autoInv, data.manualMax);
                
                let rem = "";
                if (data.manualMax > autoInv) {
                    rem += `${finalStaff} staff member(s) required (Manual Override). `;
                } else {
                    rem += `${finalStaff} staff member(s) required. `;
                    if (data.cands > 30) rem += `Extra teacher engaged to satisfy 1:30 over-capacity ratio. `;
                }
                if (data.isAux) rem += `Auxiliary technical/specialized room setup verified. `;

                const subjList = data.subjects.join(", ");
                const assignedArr = Array.from(data.staffNames);
                const staffDisplay = assignedArr.length > 0 ? assignedArr.join(", ") : "<span style='color:var(--text-3); font-style:italic'>None explicitly assigned</span>";

                html += `<div class="report-section" style="margin-top:15px;">
                    <b>${room.replace('Auxiliary: ', '')} ${data.isAux ? '<span style="color:var(--amber);font-size:11px">[AUX]</span>' : ''}</b><br>
                    <small>${data.cands} Total Candidates | Subjects: ${subjList}</small><br>
                    <div style="margin: 6px 0; font-size: 12px; color: var(--blue-mid);">👥 <b>Assigned:</b> ${staffDisplay}</div>
                    <div class="remarks-box"><b>Claim Remarks:</b> ${rem}</div>
                </div>`;
            }
        }
    }
    document.getElementById('report-content').innerHTML = html;
}
// --- NEW REPORTING ENGINE END --- //

// --- NEW RECRUITMENT RADAR LOGIC START --- //
function renderRecruitment() {
  const d = loadData();
  const start = document.getElementById('recruit-start').value || todayStr();
  const end = document.getElementById('recruit-end').value;

  // Filter exams based on the keyed-in period
  let upcoming = d.exams.filter(e => e.date >= start);
  if (end) upcoming = upcoming.filter(e => e.date <= end);
  upcoming.sort((a,b) => a.date.localeCompare(b.date));

  // Group exams by Date and Time
  const slots = {};
  upcoming.forEach(e => {
    const key = e.date + '|' + e.time;
    if (!slots[key]) slots[key] = { date: e.date, time: e.time, mainCands: 0, auxExams: [] };

    const searchString = e.subject + ' ' + (e.notes||'') + ' ' + (e.room||'');
    if (AUX_REGEX.test(searchString)) {
        slots[key].auxExams.push(e);
    } else {
        slots[key].mainCands += (e.candidates + (e.ext_nlt||0) + (e.ext_jp||0));
    }
  });

  let html = '';
  for (const key in slots) {
    const slot = slots[key];
    const extraForMain = Math.ceil(slot.mainCands / 30) - 1;
    const needsExtraForMain = extraForMain > 0;
    const hasAux = slot.auxExams.length > 0;

    // Only render if there is a staffing shortage
    if (needsExtraForMain || hasAux) {
      html += `<div style="padding:12px; border:1px solid var(--border); border-radius:8px; margin-bottom:12px; background:var(--surface2);">
        <div style="font-weight:600; margin-bottom:8px; color:var(--text);">📅 ${fmtDate(slot.date)} — ${slot.time}</div>`;

      if (needsExtraForMain) {
        html += `<div style="color:var(--amber); font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
            <span style="font-size:16px">⚠️</span>
            <span><b>Main Hall Over Capacity:</b> ${slot.mainCands} candidates. Needs <b>+${extraForMain} extra staff</b>.</span>
        </div>`;
      }

      if (hasAux) {
        slot.auxExams.forEach(aux => {
          html += `<div style="color:var(--blue-mid); font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:6px;">
            <span style="font-size:16px">🔬</span>
            <span><b>Auxiliary Room:</b> ${aux.subject} (${aux.room}). Needs <b>1 dedicated staff</b>.</span>
          </div>`;
        });
      }
      html += `</div>`;
    }
  }

  document.getElementById('recruitment-list').innerHTML = html || `<div style="padding:30px; text-align:center; color:var(--green-mid); font-weight:500;">No extra recruits needed for this period. You are fully staffed! 🎉</div>`;
}
// --- NEW RECRUITMENT RADAR LOGIC END --- //

function showPanel(n){ 
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); 
    document.querySelectorAll('.nav-btn, .bottom-nav-btn').forEach(b=>b.classList.remove('active')); 
    document.getElementById('panel-'+n).classList.add('active'); 
    const bn=document.getElementById('bnav-'+n); 
    if(bn) bn.classList.add('active'); 
    
    if(n=='dashboard') renderDashboard(); 
    if(n=='schedule') renderAllExams(); 
    if(n=='staff') renderStaff(); 
    if(n=='reports') { populateReportFilters(); renderReports(); }
    if(n=='recruitment') renderRecruitment(); 
}

function toggleTheme(){ document.documentElement.hasAttribute('data-theme')?document.documentElement.removeAttribute('data-theme'):document.documentElement.setAttribute('data-theme','dark'); renderDashboard(); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(ds){ const d=new Date(ds+'T12:00:00'); return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function subjColor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return COLS[h%COLS.length]}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

(function(){ 
    const th = localStorage.getItem('examhub_theme') || 'dark'; 
    if(th==='dark') document.documentElement.setAttribute('data-theme','dark'); 
    renderDashboard(); 
    renderStaff(); 
})();
